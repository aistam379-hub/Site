<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلبك تم — بدون اتصال</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.wrap{max-width:320px}
.icon{font-size:64px;margin-bottom:20px}
h1{font-size:24px;font-weight:900;color:#1a1a1a;margin-bottom:8px}
p{font-size:15px;color:#737373;line-height:1.7;margin-bottom:24px}
button{padding:14px 32px;border:none;border-radius:14px;background:#F6921E;color:#fff;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">📡</div>
  <h1>لا يوجد اتصال بالإنترنت</h1>
  <p>تحقق من اتصالك وحاول مرة أخرى</p>
  <button onclick="location.reload()">إعادة المحاولة</button>
</div>
</body>
</html>
